services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: energy-backend
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: energy_db
      DB_USERNAME: root
      DB_PASSWORD: root
    networks:
      - energy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: energy-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - energy-network

  db:
    image: mysql:8.0
    container_name: energy-db
    restart: always
    environment:
      MYSQL_DATABASE: energy_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql   
    networks:
      - energy-network

volumes:
  db_data:

networks:
  energy-network:
    driver: bridge